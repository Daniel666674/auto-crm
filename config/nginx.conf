##############################################################################
# BlackScale Nexus — Nginx configuration
# Target: nexus.blackscale.consulting
# Security target: A+ on securityheaders.com
##############################################################################

server_tokens off;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nexus.blackscale.consulting;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus.blackscale.consulting;

    # ─── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/nexus.blackscale.consulting/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus.blackscale.consulting/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.brevo.com https://analyticsdata.googleapis.com https://calendar.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ─── Blocked paths ──────────────────────────────────────────────────────
    location ~ /\.env { return 403; }
    location ~ /\.git  { return 403; }
    location /data/    { return 403; }
    location /node_modules/ { return 403; }
    location ~ /scripts/ { return 403; }

    # ─── Root → /app/ ───────────────────────────────────────────────────────
    location = / {
        return 301 /app/;
    }

    # ─── Static Next.js assets (long-lived cache) ───────────────────────────
    location /app/_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        proxy_set_header Host $host;
    }

    # ─── Service worker (no cache) ──────────────────────────────────────────
    location = /app/sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_set_header Host $host;
    }

    # ─── Proxy /app/ to Next.js ─────────────────────────────────────────────
    location /app/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    # ─── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/nexus-access.log;
    error_log  /var/log/nginx/nexus-error.log;
}
